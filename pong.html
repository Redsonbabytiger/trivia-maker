<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Ping Pong - Difficulty Mode</title>

<style>
body {
    margin: 0;
    background-color: #2c3e50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: white;
    font-family: Arial, sans-serif;
}

.controls {
    margin-bottom: 10px;
}

button.diff {
    margin: 5px;
    padding: 8px 16px;
    font-size: 1rem;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.easy { background: #2ecc71; }
.medium { background: #f1c40f; }
.hard { background: #e74c3c; }

#game-container {
    position: relative;
    touch-action: none;
}

canvas {
    background-color: #34495e;
    border: 4px solid #ecf0f1;
    border-radius: 5px;
}

#overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 400px;
    height: 600px;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
}

#playBtn {
    padding: 15px 40px;
    font-size: 1.5rem;
    background: #27ae60;
    border: none;
    color: white;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="controls">
    Difficulty:
    <button class="diff easy" onclick="setDifficulty('easy')">Easy</button>
    <button class="diff medium" onclick="setDifficulty('medium')">Medium</button>
    <button class="diff hard" onclick="setDifficulty('hard')">Hard</button>
</div>

<div id="game-container">
    <div id="overlay">
        <button id="playBtn">Play</button>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const playBtn = document.getElementById("playBtn");

const WINNING_SCORE = 5;

let gameRunning = false;
let isGameOver = false;

// 🎚 Difficulty settings
let difficulty = {
    aiSpeed: 3.5,
    error: 30,
    reaction: 10
};

function setDifficulty(level) {
    if (level === "easy") {
        difficulty = { aiSpeed: 2.5, error: 60, reaction: 18 };
    } else if (level === "medium") {
        difficulty = { aiSpeed: 3.5, error: 30, reaction: 10 };
    } else if (level === "hard") {
        difficulty = { aiSpeed: 5, error: 10, reaction: 4 };
    }

    resetGame();
}

// Game objects
const ball = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 8,
    speed: 4.5,
    velocityX: 4.5,
    velocityY: 4.5
};

const user = {
    x: canvas.width / 2 - 40,
    y: canvas.height - 30,
    width: 80,
    height: 10,
    score: 0,
    speed: 7
};

const computer = {
    x: canvas.width / 2 - 40,
    y: 20,
    width: 80,
    height: 10
};

const keys = { a: false, d: false };

// Input
window.addEventListener("keydown", e => {
    if (e.key.toLowerCase() === "a") keys.a = true;
    if (e.key.toLowerCase() === "d") keys.d = true;
});
window.addEventListener("keyup", e => {
    if (e.key.toLowerCase() === "a") keys.a = false;
    if (e.key.toLowerCase() === "d") keys.d = false;
});

canvas.addEventListener("touchmove", e => {
    const rect = canvas.getBoundingClientRect();
    const touchX = e.touches[0].clientX - rect.left;
    user.x = touchX - user.width / 2;
});

// Start
playBtn.onclick = () => {
    overlay.style.display = "none";
    gameRunning = true;
};

// Reset game (used for difficulty switching)
function resetGame() {
    user.score = 0;
    computer.score = 0;
    resetBall();
}

// Ball reset
function resetBall() {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    ball.speed = 4.5;
    ball.velocityY = -ball.velocityY;
}

// 🏁 Win check restored
function checkWin() {
    if (user.score >= WINNING_SCORE) {
        alert("You win!");
        window.location.href = "index.html";
    }
    if (computer.score >= WINNING_SCORE) {
        alert("Computer wins!");
        window.location.href = "index.html";
    }
}

// AI prediction
function predictBallX() {
    let x = ball.x;
    let y = ball.y;
    let vx = ball.velocityX;
    let vy = ball.velocityY;

    while (y > computer.y + computer.height) {
        x += vx;
        y += vy;

        if (x < ball.radius || x > canvas.width - ball.radius) {
            vx = -vx;
        }
    }
    return x;
}

let aiTargetX = canvas.width / 2;
let aiTimer = 0;

function update() {
    if (!gameRunning || isGameOver) return;

    // Player
    if (keys.a) user.x -= user.speed;
    if (keys.d) user.x += user.speed;

    // AI
    if (ball.velocityY < 0) {
        aiTimer++;
        if (aiTimer > difficulty.reaction) {
            aiTargetX = predictBallX() + (Math.random() - 0.5) * difficulty.error;
            aiTimer = 0;
        }

        let center = computer.x + computer.width / 2;
        let diff = aiTargetX - center;

        if (Math.abs(diff) > 3) {
            computer.x += Math.sign(diff) * difficulty.aiSpeed;
        }
    }

    // Ball
    ball.x += ball.velocityX;
    ball.y += ball.velocityY;

    if (ball.x < 0 || ball.x > canvas.width) {
        ball.velocityX = -ball.velocityX;
    }

    let player = (ball.y > canvas.height / 2) ? user : computer;

    if (collision(ball, player)) {
        let collidePoint = (ball.x - (player.x + player.width / 2)) / (player.width / 2);
        let angle = collidePoint * Math.PI / 4;
        let direction = (ball.y < canvas.height / 2) ? 1 : -1;

        ball.velocityX = ball.speed * Math.sin(angle);
        ball.velocityY = direction * ball.speed * Math.cos(angle);
        ball.speed += 0.15;
    }

    if (ball.y < 0) {
        user.score++;
        resetBall();
        checkWin();
    }

    if (ball.y > canvas.height) {
        computer.score++;
        resetBall();
        checkWin();
    }
}

function collision(b, p) {
    return b.x > p.x &&
           b.x < p.x + p.width &&
           b.y > p.y &&
           b.y < p.y + p.height;
}

function render() {
    ctx.fillStyle = "#34495e";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText(computer.score, 20, canvas.height / 2 - 20);
    ctx.fillText(user.score, 20, canvas.height / 2 + 40);

    ctx.fillRect(user.x, user.y, user.width, user.height);
    ctx.fillRect(computer.x, computer.y, computer.width, computer.height);

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fill();
}

function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
