<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Ping Pong - Slow Mode</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
        }
        #game-container {
            position: relative;
        }
        canvas {
            background-color: #34495e;
            border: 4px solid #ecf0f1;
            border-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: block;
        }
        .instructions {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        /* Play Button Overlay */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 400px;
            height: 600px;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            z-index: 10;
        }
        #playBtn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #playBtn:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

    <div class="instructions">Controls: <strong>A</strong> (Left) and <strong>D</strong> (Right)</div>
    
    <div id="game-container">
        <div id="overlay">
            <button id="playBtn">Play Game</button>
        </div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const playBtn = document.getElementById("playBtn");

        const WINNING_SCORE = 5; 
        let isGameOver = false;
        let gameRunning = false; // Controls if the ball moves

        // Game Objects - Speed slowed to 3
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 8,
            speed: 3, 
            velocityX: 3,
            velocityY: 3,
            color: "#e74c3c"
        };

        const user = {
            x: canvas.width / 2 - 40,
            y: canvas.height - 30,
            width: 80,
            height: 10,
            color: "#3498db",
            score: 0,
            speed: 6
        };

        const computer = {
            x: canvas.width / 2 - 40,
            y: 20,
            width: 80,
            height: 10,
            color: "#e67e22",
            score: 0
        };

        const keys = { a: false, d: false };

        window.addEventListener("keydown", (e) => {
            if (e.key === "a" || e.key === "A") keys.a = true;
            if (e.key === "d" || e.key === "D") keys.d = true;
        });

        window.addEventListener("keyup", (e) => {
            if (e.key === "a" || e.key === "A") keys.a = false;
            if (e.key === "d" || e.key === "D") keys.d = false;
        });

        // Start button logic
        playBtn.addEventListener("click", () => {
            overlay.style.display = "none";
            gameRunning = true;
        });

        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawCircle(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
        }

        function drawText(text, x, y, color) {
            ctx.fillStyle = color;
            ctx.font = "30px Arial";
            ctx.fillText(text, x, y);
        }

        function drawNet() {
            for (let i = 0; i <= canvas.width; i += 20) {
                drawRect(i, canvas.height / 2 - 1, 10, 2, "rgba(255,255,255,0.2)");
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = 3; 
            ball.velocityY = -ball.velocityY; 
        }

        function checkWinCondition() {
            if (user.score >= WINNING_SCORE) {
                isGameOver = true;
                alert("Congratulations! You won!");
                window.location.href = "index.html";
            } else if (computer.score >= WINNING_SCORE) {
                isGameOver = true;
                alert("The computer wins this time.");
                window.location.href = "index.html";
            }
        }

        function collision(b, p) {
            return b.x + b.radius > p.x && b.y + b.radius > p.y && 
                   b.x - b.radius < p.x + p.width && b.y - b.radius < p.y + p.height;
        }

        function update() {
            if (isGameOver || !gameRunning) return;

            if (keys.a && user.x > 0) user.x -= user.speed;
            if (keys.d && user.x < canvas.width - user.width) user.x += user.speed;

            // Computer AI
            computer.x += (ball.x - (computer.x + computer.width / 2)) * 0.07;

            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) {
                ball.velocityX = -ball.velocityX;
            }

            let player = (ball.y + ball.radius > canvas.height / 2) ? user : computer;

            if (collision(ball, player)) {
                let collidePoint = ball.x - (player.x + player.width / 2);
                collidePoint = collidePoint / (player.width / 2);
                let angleRad = collidePoint * (Math.PI / 4);
                let direction = (ball.y + ball.radius < canvas.height / 2) ? 1 : -1;
                
                ball.velocityX = ball.speed * Math.sin(angleRad);
                ball.velocityY = direction * ball.speed * Math.cos(angleRad);
                ball.speed += 0.1; // Slower acceleration
            }

            if (ball.y - ball.radius < 0) {
                user.score++;
                resetBall();
                checkWinCondition();
            } else if (ball.y + ball.radius > canvas.height) {
                computer.score++;
                resetBall();
                checkWinCondition();
            }
        }

        function render() {
            drawRect(0, 0, canvas.width, canvas.height, "#34495e");
            drawNet();
            drawText(computer.score, 20, canvas.height / 2 - 20, "#ecf0f1");
            drawText(user.score, 20, canvas.height / 2 + 45, "#ecf0f1");
            drawRect(user.x, user.y, user.width, user.height, user.color);
            drawRect(computer.x, computer.y, computer.width, computer.height, computer.color);
            drawCircle(ball.x, ball.y, ball.radius, ball.color);
        }

        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
