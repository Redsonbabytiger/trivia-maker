<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Ping Pong - Final</title>

<style>
body {
    margin: 0;
    background-color: #2c3e50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: white;
    font-family: Arial, sans-serif;
}

.controls {
    margin-bottom: 5px;
}

button.diff {
    margin: 5px;
    padding: 8px 16px;
    font-size: 1rem;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.easy { background: #2ecc71; }
.medium { background: #f1c40f; }
.hard { background: #e74c3c; }

#difficulty-indicator {
    margin-bottom: 8px;
    font-size: 1.2rem;
}

#current-difficulty {
    font-weight: bold;
    color: #bdc3c7;
}

#game-container {
    position: relative;
    touch-action: none;
}

canvas {
    background-color: #34495e;
    border: 4px solid #ecf0f1;
    border-radius: 5px;
}

#overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 400px;
    height: 600px;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
}

#playBtn {
    padding: 15px 40px;
    font-size: 1.5rem;
    background: #27ae60;
    border: none;
    color: white;
    border-radius: 5px;
    opacity: 0.5;
    cursor: not-allowed;
}
</style>
</head>

<body>

<div class="controls">
    Difficulty:
    <button class="diff easy" onclick="setDifficulty('easy')">Easy</button>
    <button class="diff medium" onclick="setDifficulty('medium')">Medium</button>
    <button class="diff hard" onclick="setDifficulty('hard')">Hard</button>
</div>

<div id="difficulty-indicator">
    Difficulty: <span id="current-difficulty">Not Selected</span>
</div>

<div id="game-container">
    <div id="overlay">
        <button id="playBtn">Play</button>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const playBtn = document.getElementById("playBtn");

const WINNING_SCORE = 4;

let gameRunning = false;
let selectedDifficulty = null;

// Difficulty config
let difficulty = {};

const ball = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 8,
    speed: 4.5,
    velocityX: 4.5,
    velocityY: 4.5
};

const user = {
    x: canvas.width / 2 - 40,
    y: canvas.height - 30,
    width: 80,
    height: 10,
    score: 0,
    speed: 7
};

const computer = {
    x: canvas.width / 2 - 40,
    y: 20,
    width: 80,
    height: 10,
    vx: 0,
    reactionTimer: 0
};

const keys = { a: false, d: false };

playBtn.disabled = true;

// Input
window.addEventListener("keydown", e => {
    if (e.key.toLowerCase() === "a") keys.a = true;
    if (e.key.toLowerCase() === "d") keys.d = true;
});
window.addEventListener("keyup", e => {
    if (e.key.toLowerCase() === "a") keys.a = false;
    if (e.key.toLowerCase() === "d") keys.d = false;
});

canvas.addEventListener("touchmove", e => {
    const rect = canvas.getBoundingClientRect();
    const touchX = e.touches[0].clientX - rect.left;
    user.x = touchX - user.width / 2;
});

// Difficulty selection
function setDifficulty(level) {
    selectedDifficulty = level;

    if (level === "easy") {
        difficulty = { error: 100, smoothing: 0.04, maxSpeed: 2, accel: 0.0015, friction: 0.85, reaction: 20 };
    } else if (level === "medium") {
        difficulty = { error: 45, smoothing: 0.08, maxSpeed: 3.5, accel: 0.0025, friction: 0.9, reaction: 10 };
    } else if (level === "hard") {
        difficulty = { error: 10, smoothing: 0.14, maxSpeed: 6, accel: 0.004, friction: 0.93, reaction: 4 };
    }

    const label = document.getElementById("current-difficulty");
    label.textContent = level.toUpperCase();

    if (level === "easy") label.style.color = "#2ecc71";
    if (level === "medium") label.style.color = "#f1c40f";
    if (level === "hard") label.style.color = "#e74c3c";

    document.querySelectorAll(".diff").forEach(btn => btn.style.outline = "none");
    document.querySelector("." + level).style.outline = "3px solid white";

    playBtn.disabled = false;
    playBtn.style.opacity = "1";
    playBtn.style.cursor = "pointer";

    resetGame();
}

playBtn.onclick = () => {
    if (!selectedDifficulty) return;
    overlay.style.display = "none";
    gameRunning = true;
};

function resetGame() {
    user.score = 0;
    computer.score = 0;
    resetBall();
}

function resetBall() {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    ball.speed = 4.5;
    ball.velocityY = -ball.velocityY;
}

function checkWin() {
    if (user.score >= WINNING_SCORE) {
        endGame("You win!");
    } else if (computer.score >= WINNING_SCORE) {
        endGame("Computer wins!");
    }
}

function endGame(message) {
    gameRunning = false;

    setTimeout(() => {
        alert(message);
        window.location.href = "index.html";
    }, 100);
}

function predictBallX() {
    let x = ball.x;
    let y = ball.y;
    let vx = ball.velocityX;
    let vy = ball.velocityY;

    while (y > computer.y + computer.height) {
        x += vx;
        y += vy;

        if (x < ball.radius || x > canvas.width - ball.radius) {
            vx = -vx;
        }

        vx *= 0.999;
    }
    return x;
}

let aiTargetX = canvas.width / 2;

function update() {
    if (!gameRunning) return;

    if (keys.a) user.x -= user.speed;
    if (keys.d) user.x += user.speed;

    let center = computer.x + computer.width / 2;
    let desiredX = aiTargetX;

    if (ball.velocityY < 0) {
        computer.reactionTimer++;

        if (computer.reactionTimer >= difficulty.reaction) {
            let prediction = predictBallX();
            let error = (Math.random() - 0.5) * difficulty.error;

            desiredX = prediction + error;
            computer.reactionTimer = 0;
        }
    } else {
        desiredX = canvas.width / 2;
    }

    aiTargetX += (desiredX - aiTargetX) * difficulty.smoothing;

    let diff = aiTargetX - center;

    computer.vx += diff * difficulty.accel;
    computer.vx *= difficulty.friction;

    if (computer.vx > difficulty.maxSpeed) computer.vx = difficulty.maxSpeed;
    if (computer.vx < -difficulty.maxSpeed) computer.vx = -difficulty.maxSpeed;

    computer.x += computer.vx;
    computer.x = Math.max(0, Math.min(canvas.width - computer.width, computer.x));

    ball.x += ball.velocityX;
    ball.y += ball.velocityY;

    if (ball.x < 0 || ball.x > canvas.width) {
        ball.velocityX = -ball.velocityX;
    }

    let player = (ball.y > canvas.height / 2) ? user : computer;

    if (collision(ball, player)) {
        let collidePoint = (ball.x - (player.x + player.width / 2)) / (player.width / 2);
        let angle = collidePoint * Math.PI / 4;
        let direction = (ball.y < canvas.height / 2) ? 1 : -1;

        ball.velocityX = ball.speed * Math.sin(angle);
        ball.velocityY = direction * ball.speed * Math.cos(angle);
        ball.speed += 0.15;
    }

    if (ball.y < 0) {
        user.score++;
        resetBall();
        checkWin();
    }

    if (ball.y > canvas.height) {
        computer.score++;
        resetBall();
        checkWin();
    }
}

function collision(b, p) {
    return b.x > p.x &&
           b.x < p.x + p.width &&
           b.y > p.y &&
           b.y < p.y + p.height;
}

function render() {
    ctx.fillStyle = "#34495e";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText(computer.score, 20, canvas.height / 2 - 20);
    ctx.fillText(user.score, 20, canvas.height / 2 + 40);

    ctx.fillRect(user.x, user.y, user.width, user.height);
    ctx.fillRect(computer.x, computer.y, computer.width, computer.height);

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fill();
}

function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
